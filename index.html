
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Tracker</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 5px; 
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 10px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        .info-card { 
            background: #000; 
            border: 1px solid #222; 
            border-radius: 10px; 
            height: 160px; 
            overflow: hidden; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        @media (max-width: 600px) {
            .info-card {
                height: 90px; 
                border-radius: 6px;
            }
            .grid-container {
                gap: 6px; 
            }
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="info-card"><iframe src="https://s.tradingview.com/embed-widget/single-quote/?symbol=CAPITALCOM%3AUS30&theme=dark&locale=en"></iframe></div>
        <div class="info-card"><iframe src="https://s.tradingview.com/embed-widget/single-quote/?symbol=CAPITALCOM%3AUS500&theme=dark&locale=en"></iframe></div>
        <div class="info-card"><iframe src="https://s.tradingview.com/embed-widget/single-quote/?symbol=TVC%3AGOLD&theme=dark&locale=en"></iframe></div>
        <div class="info-card"><iframe src="https://s.tradingview.com/embed-widget/single-quote/?symbol=BITSTAMP%3ABTCUSD&theme=dark&locale=en"></iframe></div>
        <div class="info-card"><iframe src="https://s.tradingview.com/embed-widget/single-quote/?symbol=NASDAQ%3ATSLA&theme=dark&locale=en"></iframe></div>
        <div class="info-card"><iframe src="https://s.tradingview.com/embed-widget/single-quote/?symbol=NASDAQ%3ASPCX&theme=dark&locale=en"></iframe></div>
    </div>
</body>
</html>
