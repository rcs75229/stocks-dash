<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Tracker</title>
    <style>
        body { 
            background: #000; 
            margin: 0; 
            padding: 10px; 
            font-family: sans-serif; 
        }
        .version-marker {
            text-align: center;
            font-size: 14px;
            color: #ff4500;
            padding-bottom: 10px;
        }
        .sidebar { 
            width: 100%; 
            max-width: 350px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin: 0 auto;
        }
        .card { 
            background: #131722; 
            border-radius: 12px; 
            border: 1px solid #333; 
            height: 250px; /* Increased to 250px */
            width: 100%;
            overflow: hidden; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <div class="version-marker">VERSION 233</div>
    <div class="sidebar">
        <div class="card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=CAPITALCOM:US30&theme=dark&locale=en"></iframe></div>
        <div class="card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=CAPITALCOM:US500&theme=dark&locale=en"></iframe></div>
        <div class="card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=TVC:GOLD&theme=dark&locale=en"></iframe></div>
        <div class="card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BITSTAMP:BTCUSD&theme=dark&locale=en"></iframe></div>
        <div class="card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=NASDAQ:TSLA&theme=dark&locale=en"></iframe></div>
        <div class="card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=NASDAQ:SPCX&theme=dark&locale=en"></iframe></div>
    </div>
</body>
</html>
